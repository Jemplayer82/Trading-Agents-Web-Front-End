name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bundle deployment files
        run: |
          mkdir bundle
          cp docker-compose.yml bundle/
          cp .env.example bundle/
          cd bundle && zip ../tradingagents-${{ github.ref_name }}.zip ./*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tradingagents-${{ github.ref_name }}.zip
          generate_release_notes: true
