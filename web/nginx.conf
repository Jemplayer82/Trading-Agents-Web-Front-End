worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream agents_api {
        server tradingagents-api:8000;
    }

    upstream agents_portfolio {
        server tradingagents-portfolio:8000;
    }

    server {
        listen 8000;

        # Static assets and SPA fallback
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # S&P 500 scanner routes — must come BEFORE /api/portfolio and /api/
        location /api/spy {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Full S&P 500 deep dive can take many hours
            proxy_read_timeout 43200s;
            proxy_send_timeout 43200s;
            proxy_buffering off;
        }

        # Live per-account holdings — served by the portfolio container
        location /api/accounts {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Portfolio scan routes — must come BEFORE the generic /api/ block
        location /api/portfolio {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Portfolio scans can take a long time — generous timeouts
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
            proxy_buffering off;
        }

        # All other API + WebSocket traffic to the api container
        location /api/ {
            proxy_pass http://agents_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }
}
