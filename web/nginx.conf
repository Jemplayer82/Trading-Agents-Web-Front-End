# TradingAgents Web — nginx config for the `tradingagents-web` container.
# Serves the static frontend (web/static/) and reverse-proxies /api/* to TWO
# separate FastAPI processes (see docker-compose.yml / ARCHITECTURE.md):
#   agents_api       -> web.main:app            auth, analyses, settings,
#                                               /api/analyze + /api/bus WebSockets
#   agents_portfolio -> web.portfolio_main:app  portfolio + S&P scans, live accounts
#
# ROUTE PRIORITY — read before adding endpoints:
# These are nginx PREFIX locations, so the longest matching prefix wins (file
# order does not decide it): /api/spy, /api/accounts and /api/portfolio always
# beat the generic /api/ block. Two gotchas that have bitten in production:
#   1. Matching is plain string-prefix, not path-segment: `location /api/spy`
#      also catches /api/spy-scans and /api/spy-account, and `location
#      /api/portfolio` catches /api/portfolio-scan(s). That's load-bearing.
#   2. Any NEW route added to web/portfolio_main.py that does NOT start with one
#      of those three prefixes falls through to the generic /api/ block, gets sent
#      to the api app instead, and 404s in production. portfolio_main's own
#      /api/health and /api/auth/schwab/status are examples — they are unreachable
#      through nginx. Add a matching `location` line here when adding such routes.
worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # WebSocket upgrade plumbing for /api/analyze and /api/bus: forward the
    # client's Upgrade header, or "close" for plain HTTP requests.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream agents_api {
        server tradingagents-api:8000;
    }

    upstream agents_portfolio {
        server tradingagents-portfolio:8000;
    }

    server {
        listen 8000;

        # Static assets and SPA fallback
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # S&P 500 scanner routes -> portfolio app. Longest-prefix match means this
        # wins over the generic /api/ below; the prefix also catches /api/spy-scans
        # and /api/spy-account (string prefix, not path segment).
        location /api/spy {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Full S&P 500 deep dive can take many hours
            proxy_read_timeout 43200s;
            proxy_send_timeout 43200s;
            proxy_buffering off;
        }

        # Live per-account holdings -> portfolio app (not the api app — without
        # this block the generic /api/ would send it there and the Portfolio tab's
        # account view would 404). No WebSocket here, so no Upgrade headers.
        location /api/accounts {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Portfolio scan routes -> portfolio app. String prefix also catches
        # /api/portfolio-scan and /api/portfolio-scans.
        location /api/portfolio {
            proxy_pass http://agents_portfolio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Portfolio scans can take a long time — generous timeouts
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;
            proxy_buffering off;
        }

        # Catch-all: everything else under /api/ (auth, analyses, settings,
        # credentials, the /api/analyze and /api/bus WebSockets) -> api app.
        location /api/ {
            proxy_pass http://agents_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }
}
